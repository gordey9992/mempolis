<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>МЕМПОЛИС 4.0 — Социальная сеть мемов</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #ff6b6b;
            --success: #4ecdc4;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding-top: 70px;
            padding-bottom: 90px;
        }

        /* Фиксированная верхняя панель навигации */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            overflow-x: auto;
            gap: 5px;
            padding: 10px;
            z-index: 1000;
            border-bottom: 1px solid #444;
        }
        .top-nav button {
            background: var(--dark);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
            font-size: 0.9rem;
        }
        .top-nav button.active {
            background: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .content-section {
            display: none;
        }
        .content-section.active {
            display: block;
        }

        .meme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .meme-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .meme-card:hover {
            transform: translateY(-5px);
        }
        .meme-card img, .meme-card video {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #000;
        }
        .meme-caption {
            padding: 15px;
            font-weight: 600;
        }
        .meme-actions {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: var(--light);
            flex-wrap: wrap;
        }
        .action-btn {
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            background: white;
            transform: scale(1.05);
        }
        .comments-section {
            padding: 10px;
            background: #f9f9f9;
            border-top: 1px solid #ddd;
        }
        .comment {
            padding: 8px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }
        .comment-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .comment-input input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #ddd;
        }
        .comment-input button {
            padding: 8px 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
        }
        .upload-area {
            border: 3px dashed var(--primary);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin: 20px 0;
        }
        .auth-form {
            max-width: 400px;
            margin: 0 auto;
        }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
        }
        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 1001;
            transform: translateX(400px);
            transition: transform 0.3s;
        }
        .notification.show { transform: translateX(0); }
        .notification.error { background: var(--accent); }

        /* Фиксированный аудиоплеер */
        .fixed-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        .fixed-player.show { transform: translateY(0); }
        .player-info {
            flex: 1;
            color: white;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .player-controls button, .player-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
        }
        .player-close { color: #ff6b6b; }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .meme-card img, .meme-card video { height: 200px; }
        }
    </style>
</head>
<body>
    <div class="top-nav" id="topNav"></div>
    <div class="container" id="appRoot"></div>
    <div class="fixed-player" id="audioPlayer">
        <div class="player-info" id="playerInfo">Нет трека</div>
        <div class="player-controls">
            <button id="playPauseBtn">⏸️</button>
            <button id="closePlayerBtn">❌</button>
        </div>
    </div>

    <script>
        let socket = io();
        let currentUser = null;
        let onlineUsers = new Set();
        let audioElement = null;
        let currentComments = {}; // { тип_ид: [комментарии] }

        // === Вспомогательные функции ===
        function showNotification(msg, type = 'normal') {
            const notif = document.createElement('div');
            notif.className = `notification ${type === 'error' ? 'error' : ''}`;
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.classList.add('show'), 100);
            setTimeout(() => { notif.classList.remove('show'); setTimeout(() => notif.remove(), 300); }, 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function apiRequest(url, options = {}) {
            try {
                const res = await fetch(url, {
                    headers: { 'Content-Type': 'application/json' },
                    ...options
                });
                if (!res.ok) {
                    const error = await res.json();
                    throw new Error(error.error || 'Ошибка');
                }
                return await res.json();
            } catch(e) {
                showNotification(e.message, 'error');
                throw e;
            }
        }

        // === Аудиоплеер ===
        function initPlayer() {
            if (!audioElement) {
                audioElement = new Audio();
                audioElement.addEventListener('play', () => playPauseBtn.textContent = '⏸️');
                audioElement.addEventListener('pause', () => playPauseBtn.textContent = '▶️');
                audioElement.addEventListener('ended', () => {
                    document.getElementById('audioPlayer').classList.remove('show');
                });
            }
            document.getElementById('playPauseBtn').onclick = () => {
                if (audioElement.paused) audioElement.play();
                else audioElement.pause();
            };
            document.getElementById('closePlayerBtn').onclick = () => {
                audioElement.pause();
                document.getElementById('audioPlayer').classList.remove('show');
            };
        }

        function playAudio(url, title) {
            if (!audioElement) initPlayer();
            audioElement.src = url;
            audioElement.play();
            document.getElementById('playerInfo').textContent = title || 'Аудио';
            document.getElementById('audioPlayer').classList.add('show');
        }

        // === Комментарии (локально для простоты, можно расширить на БД) ===
        function loadComments(contentType, contentId, containerId) {
            const key = `${contentType}_${contentId}`;
            const comments = currentComments[key] || [];
            const commentsHtml = comments.map(c => `<div class="comment"><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</div>`).join('');
            document.getElementById(containerId).innerHTML = `
                <div class="comments-section">
                    <div id="comments-list-${contentId}">${commentsHtml || '<i>Нет комментариев</i>'}</div>
                    ${currentUser ? `<div class="comment-input">
                        <input type="text" id="comment-text-${contentId}" placeholder="Ваш комментарий...">
                        <button onclick="addComment('${contentType}', ${contentId})">Отправить</button>
                    </div>` : '<i>Войдите, чтобы комментировать</i>'}
                </div>
            `;
        }

        window.addComment = function(contentType, contentId) {
            if (!currentUser) { showNotification('Войдите в аккаунт', 'error'); return; }
            const input = document.getElementById(`comment-text-${contentId}`);
            const text = input.value.trim();
            if (!text) return;
            const key = `${contentType}_${contentId}`;
            if (!currentComments[key]) currentComments[key] = [];
            currentComments[key].push({ user: currentUser.username, text });
            input.value = '';
            loadComments(contentType, contentId, `comments-${contentType}-${contentId}`);
        };

        // === Основные функции ===
        async function randomMeme() {
            try {
                const memes = await apiRequest('/api/memes');
                if (memes.length) {
                    const random = memes[Math.floor(Math.random() * memes.length)];
                    window.location.href = `/?meme=${random.id}`;
                } else showNotification('Нет мемов', 'error');
            } catch(e) {}
        }

        async function likeContent(type, id) {
            if (!currentUser) { showNotification('Войдите', 'error'); return; }
            await apiRequest('/api/like', { method: 'POST', body: JSON.stringify({ userId: currentUser.id, contentType: type, contentId: id }) });
            loadContent();
        }

        async function subscribe(subscriberId, targetId) {
            await apiRequest('/api/subscribe', { method: 'POST', body: JSON.stringify({ subscriber_id: subscriberId, subscribed_to_id: targetId }) });
            showNotification('✅ Готово');
            loadUsers();
        }

        function shareContent(type, id) {
            const url = `${window.location.origin}/?${type}=${id}`;
            navigator.clipboard.writeText(url);
            showNotification('📋 Ссылка скопирована');
        }

        // === Рендер ===
        function renderTopNav(activeSection) {
            const sections = ['memes', 'videos', 'audios', 'feed', 'upload', 'users', 'profile'];
            const names = { memes:'📷 Мемы', videos:'🎬 Видео', audios:'🎵 Музыка', feed:'📱 Лента', upload:'📤 Загрузить', users:'👥 Пользователи', profile:'👤 Профиль' };
            document.getElementById('topNav').innerHTML = sections.map(s => `<button class="${activeSection === s ? 'active' : ''}" onclick="switchSection('${s}')">${names[s]}</button>`).join('');
        }

        window.switchSection = function(section) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            renderTopNav(section);
            if (section === 'upload') renderUploadForm();
            if (section === 'profile') loadProfileUI();
            if (section === 'users') loadUsers();
        };

        async function loadContent() {
            const [memes, videos, audios, feed] = await Promise.all([
                apiRequest('/api/memes'), apiRequest('/api/videos'), apiRequest('/api/audios'), apiRequest('/api/feed')
            ]);
            renderMemes(memes);
            renderVideos(videos);
            renderAudios(audios);
            renderFeed(feed);
        }

        function renderMemes(memes) {
            const container = document.getElementById('memesContainer');
            if (!container) return;
            container.innerHTML = memes.map(meme => `
                <div class="meme-card">
                    ${meme.is_animated ? `<video src="${meme.url}" controls></video>` : `<img src="${meme.url}" onerror="this.src='https://via.placeholder.com/300x200'">`}
                    <div class="meme-caption">${escapeHtml(meme.caption)}</div>
                    <div class="meme-actions">
                        <div class="action-btn" onclick="likeContent('meme', ${meme.id})">❤️ ${meme.likes || 0}</div>
                        <div class="action-btn" onclick="shareContent('meme', ${meme.id})">↗️ Поделиться</div>
                        <div class="action-btn" onclick="document.getElementById('comments-meme-${meme.id}').style.display='block'">💬 ${(currentComments[`meme_${meme.id}`] || []).length}</div>
                    </div>
                    <div id="comments-meme-${meme.id}" style="display:none"></div>
                </div>
            `).join('');
            memes.forEach(meme => {
                loadComments('meme', meme.id, `comments-meme-${meme.id}`);
            });
        }

        function renderVideos(videos) {
            const container = document.getElementById('videosContainer');
            if (!container) return;
            container.innerHTML = videos.map(video => `
                <div class="meme-card">
                    <video controls src="${video.url}"></video>
                    <div class="meme-caption">${escapeHtml(video.caption)}</div>
                    <div class="meme-actions">
                        <div class="action-btn" onclick="likeContent('video', ${video.id})">❤️ ${video.likes || 0}</div>
                        <div class="action-btn" onclick="shareContent('video', ${video.id})">↗️ Поделиться</div>
                        <div class="action-btn" onclick="document.getElementById('comments-video-${video.id}').style.display='block'">💬 ${(currentComments[`video_${video.id}`] || []).length}</div>
                    </div>
                    <div id="comments-video-${video.id}" style="display:none"></div>
                </div>
            `).join('');
            videos.forEach(video => loadComments('video', video.id, `comments-video-${video.id}`));
        }

        function renderAudios(audios) {
            const container = document.getElementById('audiosContainer');
            if (!container) return;
            container.innerHTML = audios.map(audio => `
                <div class="meme-card">
                    <div style="padding:20px; text-align:center;">
                        <div style="font-size:3rem;">🎵</div>
                        <div class="meme-caption">${escapeHtml(audio.caption)}</div>
                        <button onclick="playAudio('${audio.url}', '${escapeHtml(audio.caption)}')">▶️ Слушать</button>
                        <div class="meme-actions">
                            <div class="action-btn" onclick="likeContent('audio', ${audio.id})">❤️ ${audio.likes || 0}</div>
                            <div class="action-btn" onclick="shareContent('audio', ${audio.id})">↗️ Поделиться</div>
                            <div class="action-btn" onclick="document.getElementById('comments-audio-${audio.id}').style.display='block'">💬 ${(currentComments[`audio_${audio.id}`] || []).length}</div>
                        </div>
                        <div id="comments-audio-${audio.id}" style="display:none"></div>
                    </div>
                </div>
            `).join('');
            audios.forEach(audio => loadComments('audio', audio.id, `comments-audio-${audio.id}`));
        }

        function renderFeed(feed) {
            const container = document.getElementById('feedContainer');
            if (!container) return;
            container.innerHTML = feed.map(item => `
                <div class="meme-card">
                    <video controls style="max-height:500px; width:100%" src="${item.url}"></video>
                    <div class="meme-caption">${escapeHtml(item.caption)}</div>
                    <div class="meme-actions">
                        <div class="action-btn" onclick="likeContent('feed', ${item.id})">❤️ ${item.likes || 0}</div>
                        <div class="action-btn" onclick="shareContent('feed', ${item.id})">↗️ Поделиться</div>
                        <div class="action-btn" onclick="document.getElementById('comments-feed-${item.id}').style.display='block'">💬 ${(currentComments[`feed_${item.id}`] || []).length}</div>
                    </div>
                    <div id="comments-feed-${item.id}" style="display:none"></div>
                </div>
            `).join('');
            feed.forEach(item => loadComments('feed', item.id, `comments-feed-${item.id}`));
        }

        function renderUploadForm() {
            document.getElementById('uploadForm').innerHTML = `
                <h2>📤 Загрузить контент</h2>
                <select id="contentType" style="width:100%; padding:10px;">
                    <option value="meme">📷 Мем (изо/видео)</option><option value="video">🎬 Видео</option>
                    <option value="audio">🎵 Аудио</option><option value="feed">📱 В ленту</option>
                </select>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <div style="font-size:3rem;">📤</div><div>Выбрать файл</div>
                    <input type="file" id="fileInput" style="display:none" accept="image/*,video/*,audio/*">
                </div>
                <input type="text" id="captionInput" placeholder="Описание..." style="width:100%; padding:12px; margin:10px 0">
                <button onclick="uploadContent()">Опубликовать</button>
            `;
        }

        async function uploadContent() {
            if (!currentUser) { showNotification('Войдите', 'error'); return; }
            const file = document.getElementById('fileInput').files[0];
            if (!file) return showNotification('Выберите файл', 'error');
            const formData = new FormData();
            formData.append('file', file);
            formData.append('userId', currentUser.id);
            formData.append('caption', document.getElementById('captionInput').value);
            formData.append('type', document.getElementById('contentType').value);
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            if (res.ok) { showNotification('Опубликовано!'); loadContent(); }
            else showNotification('Ошибка', 'error');
        }

        async function loadUsers() {
            const users = await apiRequest('/api/users');
            document.getElementById('usersContainer').innerHTML = users.map(u => `
                <div class="meme-card"><div style="padding:20px;text-align:center">
                    <div style="font-size:3rem;">👤</div>
                    <div><b>${escapeHtml(u.username)}</b></div>
                    ${currentUser && currentUser.id !== u.id ? `<button onclick="subscribe(${currentUser.id}, ${u.id})">Подписаться</button>` : ''}
                </div></div>
            `).join('');
        }

        async function loadProfileUI() {
            if (!currentUser) {
                document.getElementById('profileContainer').innerHTML = `
                    <div id="loginForm" class="auth-form"><h3>🔐 Вход</h3>
                    <input id="loginUsername" class="auth-input" placeholder="Имя"><input id="loginPassword" type="password" class="auth-input" placeholder="Пароль">
                    <button onclick="login()">Войти</button><p style="text-align:center"><a href="#" onclick="showRegister()">Регистрация</a></p></div>
                    <div id="registerForm" class="auth-form" style="display:none"><h3>🚀 Регистрация</h3>
                    <input id="regUsername" class="auth-input" placeholder="Имя"><input id="regEmail" class="auth-input" placeholder="Email">
                    <input id="regPassword" type="password" class="auth-input" placeholder="Пароль"><button onclick="register()">Зарегистрироваться</button>
                    <p style="text-align:center"><a href="#" onclick="showLogin()">Вход</a></p></div>
                `;
                return;
            }
            document.getElementById('profileContainer').innerHTML = `<div class="user-info"><h2>${escapeHtml(currentUser.username)}</h2><p>⭐ Рейтинг: ${currentUser.rating || 0}</p><p>👥 Подписчиков: ${currentUser.subscribers || 0}</p><button onclick="logout()">Выйти</button></div>`;
        }

        async function login() {
            const user = await apiRequest('/api/login', { method: 'POST', body: JSON.stringify({ username: document.getElementById('loginUsername').value, password: document.getElementById('loginPassword').value }) });
            currentUser = user; localStorage.setItem('currentUser', JSON.stringify(user));
            socket.emit('user_online', user.id);
            showNotification(`Добро пожаловать, ${user.username}!`);
            renderHome();
        }
        async function register() {
            await apiRequest('/api/register', { method: 'POST', body: JSON.stringify({ username: document.getElementById('regUsername').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPassword').value }) });
            showNotification('Регистрация успешна! Войдите.');
            showLogin();
        }
        function logout() { currentUser = null; localStorage.removeItem('currentUser'); renderHome(); }
        function showRegister() { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; }
        function showLogin() { document.getElementById('loginForm').style.display='block'; document.getElementById('registerForm').style.display='none'; }

        function renderHome() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('meme')) return; // обработать отдельно
            document.getElementById('appRoot').innerHTML = `
                <div id="memes" class="content-section active"><div id="memesContainer"></div></div>
                <div id="videos" class="content-section"><div id="videosContainer"></div></div>
                <div id="audios" class="content-section"><div id="audiosContainer"></div></div>
                <div id="feed" class="content-section"><div id="feedContainer"></div></div>
                <div id="upload" class="content-section"><div id="uploadForm"></div></div>
                <div id="users" class="content-section"><div id="usersContainer"></div></div>
                <div id="profile" class="content-section"><div id="profileContainer"></div></div>
            `;
            renderTopNav('memes');
            loadContent(); loadUsers(); loadProfileUI();
            socket.on('new_content', () => loadContent());
            socket.on('like_updated', () => loadContent());
        }

        // Запуск
        const saved = localStorage.getItem('currentUser');
        if (saved) { currentUser = JSON.parse(saved); socket.emit('user_online', currentUser.id); }
        initPlayer();
        renderHome();
        window.randomMeme = randomMeme;
        window.likeContent = likeContent;
        window.shareContent = shareContent;
        window.subscribe = subscribe;
        window.login = login;
        window.register = register;
        window.logout = logout;
        window.showRegister = showRegister;
        window.showLogin = showLogin;
        window.uploadContent = uploadContent;
        window.playAudio = playAudio;
        window.addComment = addComment;
    </script>
</body>
</html>
